<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Sign In &mdash; Tilzspa</title>
  <link rel="icon" type="image/png" href="assets/logo.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@1,400;1,500&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            choc:'#3B2A20', cap:'#B87A5C', rg:'#B87A5C',
            gold:'#B87A5C', rose:'#E8D4C1', cream:'#F5EDE1', ivory:'#FAF6F0', grey:'#B8A590'
          },
          fontFamily: {
            serif:['Playfair Display','Georgia','serif'],
            sans:['Montserrat','system-ui','sans-serif']
          }
        }
      }
    }
  </script>
  <style>
    body{font-family:'Montserrat',system-ui,sans-serif;color:#1C1410;-webkit-font-smoothing:antialiased}
    h1,h2,h3{font-family:'Playfair Display',Georgia,serif}
    .divider{width:40px;height:1px;background:#B87A5C}
    .eyebrow{font-size:10px;font-weight:500;letter-spacing:0.25em;text-transform:uppercase;color:#B87A5C}
    .input-box{width:100%;background:#fff;border:1px solid rgba(184,122,92,0.3);border-radius:12px;padding:12px 16px;font-size:14px;color:#1C1410;transition:border-color .2s}
    .input-box:focus{outline:none;border-color:#3B2A20}
    .btn-primary{background:#3B2A20;color:#F5EDE1;padding:14px 28px;border-radius:100px;font-size:13px;font-weight:500;letter-spacing:0.02em;transition:background .2s;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;width:100%}
    .btn-primary:hover{background:#B87A5C}
    .btn-primary:disabled{opacity:0.7;cursor:not-allowed}
    .shake{animation:shake .4s ease}
    @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}
    .fade-in{animation:fadeIn .7s ease forwards}
    @keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
  </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4" style="background:linear-gradient(135deg,#3B2A20 0%,rgba(59,42,32,0.95) 55%,rgba(184,122,92,0.25) 100%)">

  <div class="fade-in w-full max-w-sm">

    <!-- Card -->
    <div class="bg-cream rounded-[20px] overflow-hidden" style="box-shadow:0 30px 80px rgba(0,0,0,0.25)">

      <!-- Header -->
      <div class="px-10 pt-12 pb-8 text-center">
        <p class="eyebrow mb-4">Tilzspa</p>
        <h2 class="font-serif text-2xl mb-2" style="font-weight:400;letter-spacing:-0.02em">Staff Portal</h2>
        <div class="divider mx-auto my-5"></div>
        <p class="text-grey text-xs tracking-wide">Sign in with your staff credentials.</p>
      </div>

      <!-- Form -->
      <div class="px-10 pb-10">

        <div id="errMsg" class="hidden mb-5 text-xs text-rg border border-rg/20 rounded-xl px-4 py-3 text-center" style="background:rgba(232,212,193,0.2)"></div>

        <div class="mb-4">
          <label class="eyebrow block mb-3">Email Address</label>
          <input id="email" type="email" autocomplete="email" placeholder="yourname@tilzspa.com" class="input-box" onkeydown="if(event.key==='Enter') document.getElementById('pass').focus()">
        </div>

        <div class="mb-7">
          <label class="eyebrow block mb-3">Password</label>
          <div class="relative">
            <input id="pass" type="password" autocomplete="current-password" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;" class="input-box pr-12" onkeydown="if(event.key==='Enter') doLogin()">
            <button type="button" onclick="togglePass()" aria-label="Toggle password visibility" class="absolute right-4 top-1/2 -translate-y-1/2 text-grey hover:text-choc transition-colors">
              <svg id="eyeIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
            </button>
          </div>
        </div>

        <button id="loginBtn" onclick="doLogin()" class="btn-primary">
          <span id="btnText">Sign In</span>
          <svg id="btnSpinner" class="hidden w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.5"/>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
          </svg>
        </button>

        <div class="mt-8 pt-6" style="border-top:1px solid rgba(184,122,92,0.2)">
          <p class="text-xs text-grey text-center leading-relaxed">You&rsquo;ll be directed to your dashboard automatically.</p>
        </div>

      </div>
    </div>

    <!-- Back link -->
    <p class="text-center mt-8">
      <a href="index.html" class="inline-block text-[11px] tracking-wide transition-colors" style="color:rgba(245,237,225,0.35)" onmouseover="this.style.color='rgba(245,237,225,0.65)'" onmouseout="this.style.color='rgba(245,237,225,0.35)'">&larr; Back to Tilzspa</a>
    </p>

  </div>

  <script>
    // Credential → role mapping
    const USERS = {
      'founder@tilzspa.com':    { pass: 'TilzSpa@2026', redirect: 'dashboard/founder.html',      label: 'Founder' },
      'finance@tilzspa.com':    { pass: 'TilzSpa@2026', redirect: 'dashboard/finance.html',      label: 'Finance' },
      'reception@tilzspa.com':  { pass: 'TilzSpa@2026', redirect: 'dashboard/receptionist.html', label: 'Receptionist' },
    };

    // Session key prefix
    const SESSION_KEYS = {
      'founder@tilzspa.com':   'tilz_founder',
      'finance@tilzspa.com':   'tilz_finance',
      'reception@tilzspa.com': 'tilz_reception',
    };

    function togglePass() {
      const p = document.getElementById('pass');
      p.type = p.type === 'password' ? 'text' : 'password';
    }

    function showError(msg) {
      const el = document.getElementById('errMsg');
      el.textContent = msg;
      el.classList.remove('hidden');
      const card = el.closest('.bg-cream');
      card.classList.add('shake');
      setTimeout(() => card.classList.remove('shake'), 500);
    }

    function doLogin() {
      const email = document.getElementById('email').value.trim().toLowerCase();
      const pass  = document.getElementById('pass').value;
      const btn   = document.getElementById('loginBtn');
      const txt   = document.getElementById('btnText');
      const spin  = document.getElementById('btnSpinner');

      document.getElementById('errMsg').classList.add('hidden');

      if (!email) { showError('Please enter your email address.'); return; }
      if (!pass)  { showError('Please enter your password.'); return; }

      btn.disabled = true;
      txt.textContent = 'Signing in\u2026';
      spin.classList.remove('hidden');

      setTimeout(() => {
        const user = USERS[email];

        if (!user || user.pass !== pass) {
          btn.disabled = false;
          txt.textContent = 'Sign In';
          spin.classList.add('hidden');
          showError('Invalid email or password. Please try again.');
          return;
        }

        const key = SESSION_KEYS[email];
        if (key) sessionStorage.setItem(key, Date.now());

        txt.textContent = 'Redirecting\u2026';
        window.location.href = user.redirect;
      }, 800);
    }

    window.addEventListener('DOMContentLoaded', () => {
      document.getElementById('email').focus();
    });
  </script>
</body>
</html>
